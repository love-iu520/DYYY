name: prepare build deb
run-name: 汇总 build deb 构建标题

on:
  push:
    branches:
      - main
    paths:
      - '*.h'
      - '*.m'
      - '*.mm'
      - '*.x'
      - '*.xm'
      - '*.c'
      - '*.cc'
      - '*.cpp'
      - '*.s'
      - '*.S'
      - 'DYYY.plist'
      - 'control'
      - 'Makefile'
      - 'Resources/**'
      - 'layout/**'

permissions:
  actions: write
  contents: read

concurrency:
  group: prepare-build-deb-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Collect build-relevant commits
        id: build
        env:
          GH_TOKEN: ${{ github.token }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail

          if ! .github/scripts/build-relevance.sh range "$PUSH_BEFORE" "$PUSH_AFTER"; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Only non-build Makefile settings changed; skipping Deb build."
            exit 0
          fi

          baseline=$(gh api -X GET \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/build.yml/runs" \
            -f branch="$GITHUB_REF_NAME" \
            -f status=success \
            -f per_page=100 \
            --jq '.workflow_runs[0].head_sha // empty')

          if [[ -z "$baseline" || "$baseline" == "$PUSH_AFTER" ]] ||
             ! git cat-file -e "${baseline}^{commit}" 2>/dev/null ||
             ! git merge-base --is-ancestor "$baseline" "$PUSH_AFTER"; then
            baseline="$PUSH_BEFORE"
          fi

          run_title=$(
            .github/scripts/generate-release-notes.sh \
              --build-title "$baseline" "$PUSH_AFTER"
          )

          echo "should_build=true" >> "$GITHUB_OUTPUT"
          echo "baseline=$baseline" >> "$GITHUB_OUTPUT"
          echo "source_sha=$PUSH_AFTER" >> "$GITHUB_OUTPUT"
          echo "run_title=$run_title" >> "$GITHUB_OUTPUT"
          echo "Build title: $run_title"

      - name: Dispatch build deb
        if: steps.build.outputs.should_build == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_BEFORE: ${{ steps.build.outputs.baseline }}
          BUILD_SHA: ${{ steps.build.outputs.source_sha }}
          BUILD_TITLE: ${{ steps.build.outputs.run_title }}
        run: |
          set -euo pipefail

          branch_head=$(gh api \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/${GITHUB_REF_NAME}" \
            --jq '.object.sha')
          if [[ "$branch_head" != "$BUILD_SHA" ]]; then
            echo "A newer push reached ${GITHUB_REF_NAME}; its dispatcher will create the build run."
            exit 0
          fi

          gh workflow run build.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$GITHUB_REF_NAME" \
            -f "run_title=$BUILD_TITLE" \
            -f "source_before=$BUILD_BEFORE" \
            -f "source_sha=$BUILD_SHA"
